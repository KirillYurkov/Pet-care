<div class="feedback__card">
  <div class="feedback__card-text">
    <h2 class="feedback__card-title title--h2">Client’s Feedback</h2>
    <p class="feedback__card-desc">
      “All the Lorem Ipsum generators on&nbsp;the Internet tend to&nbsp;repeat
      predefined chunks as&nbsp;necessary, making this the first true
      on&nbsp;the Internet.”
    </p>
    <div class="feedback__card-footer">
      <div class="feedback__card-autor">
        <span class="feedback__card-autor--name">Adam Morlk</span>
        <span class="feedback__card-autor--job">Software Engineer, USA</span>
      </div>
      <div class="feedback__card-rating">
        <svg class="icons star">
          <use xlink:href="./img/svg-mono.svg#star"></use>
        </svg>
        <svg class="icons star">
          <use xlink:href="./img/svg-mono.svg#star"></use>
        </svg>
        <svg class="icons star">
          <use xlink:href="./img/svg-mono.svg#star"></use>
        </svg>
        <svg class="icons star">
          <use xlink:href="./img/svg-mono.svg#star"></use>
        </svg>
        <svg class="icons star">
          <use xlink:href="./img/svg-mono.svg#star"></use>
        </svg>
      </div>
    </div>
  </div>
  <div class="feedback__card-img">
    <picture>
      <img src="./../../img/feedback.webp" alt="" />
      <source
        srcset="./../../img/feedback-small.webp"
        media="(max-width:800px)"
      />
      <source
        srcset="./../../img/feedback-small-2.webp"
        media="(max-width:600px)"
      />
    </picture>
  </div>
</div>
